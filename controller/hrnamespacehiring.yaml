apiVersion: v1
kind: Namespace
metadata:
  name: hrnamespacehiring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-net-deploy
  namespace: hrnamespacehiring
  labels:
    app: nginx-net
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-net
  template:
    metadata:
      labels:
        app: nginx-net
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault

      # Required for AKS multi‑replica workloads
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - nginx-net
              topologyKey: kubernetes.io/hostname

      # NOTE: Remove this toleration if you have a user nodepool
      tolerations:
        - key: "CriticalAddonsOnly"
          operator: "Exists"
          effect: "NoSchedule"

      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80

          # Required by AKS safeguard: resource requests/limits
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          # Readiness probe
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5

          # Liveness probe
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-net-svc
  namespace: hrnamespacehiring
spec:
  selector:
    app: nginx-net
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP